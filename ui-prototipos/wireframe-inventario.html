<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wireframe - Inventario</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: #f2f2f2; color: #111; }

    .layout { min-height: 100vh; display: grid; grid-template-columns: 220px 1fr; }

    .sidebar {
      background: #fff;
      border-right: 2px solid #111;
      padding: 20px 14px;
    }

    .logo { height: 42px; border: 2px solid #111; background: #e8e8e8; margin-bottom: 24px; }
    .nav-item { border: 2px solid #111; margin-bottom: 10px; padding: 10px; text-align: center; font-weight: 600; }

    .main { padding: 18px; }
    .toolbar {
      border: 2px solid #111;
      background: #fff;
      padding: 12px;
      margin-bottom: 14px;
      display: grid;
      grid-template-columns: 1.8fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .input, .select, .button {
      border: 2px solid #111;
      background: #fff;
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 14px;
    }

    .select { background: #f7f7f7; }
    .button {
      background: #e8e8e8;
      font-weight: 700;
      justify-content: center;
      min-width: 140px;
    }

    .table {
      border: 2px solid #111;
      background: #fff;
      min-height: 420px;
      overflow: auto;
    }

    .thead, .tr {
      display: grid;
      grid-template-columns: 0.9fr 1.4fr 1.2fr 1fr 1.1fr 1.3fr;
      min-width: 850px;
    }

    .thead {
      border-bottom: 2px solid #111;
      background: #f0f0f0;
      font-weight: 700;
    }

    .cell {
      border-right: 1px solid #111;
      padding: 10px;
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    .thead .cell:last-child, .tr .cell:last-child { border-right: 0; }
    .tr { border-bottom: 1px solid #111; background: #fff; }
    .tr:last-child { border-bottom: 0; }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 2px solid #111; }
      .toolbar { grid-template-columns: 1fr; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo"></div>
      <div class="nav-item">Dashboard</div>
      <div class="nav-item">Inventario</div>
      <div class="nav-item">Prestamos</div>
      <div class="nav-item">Usuarios</div>
    </aside>

    <main class="main">
      <section class="toolbar">
        <div class="input">Buscar equipo por codigo o nombre</div>
        <div class="select">Categoria</div>
        <div class="select">Ubicacion</div>
        <div class="select">Estado</div>
        <div class="button">Nuevo Equipo</div>
      </section>

      <section class="table">
        <div class="thead">
          <div class="cell">Codigo</div>
          <div class="cell">Nombre</div>
          <div class="cell">Categoria</div>
          <div class="cell">Estado</div>
          <div class="cell">Ubicacion</div>
          <div class="cell">Responsable</div>
        </div>

        <div class="tr"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        <div class="tr"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        <div class="tr"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        <div class="tr"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        <div class="tr"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        <div class="tr"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
      </section>
    </main>
  </div>
</body>
</html>
